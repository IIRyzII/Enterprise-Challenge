<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0a1f33, #104d71);
    font-family: 'Segoe UI', sans-serif;
}

/* Logo top-left */
.logo-container {
    position: absolute;
    top: 15px;
    left: 20px;
}

.logo-container img {
    width: 120px;
}

/* Login Card */
.login-card {
    width: 100%;
    max-width: 420px;
    padding: 40px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(15px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    color: white;
}

/* Title */
.login-card h3 {
    font-weight: 600;
}

/* Inputs */
.form-control {
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
    border-radius: 10px;
    padding: 12px;
}

.form-control::placeholder {
    color: rgba(255,255,255,0.7);
}

.form-control:focus {
    box-shadow: none;
    border: 1px solid #1cc88a;
    background: rgba(255,255,255,0.15);
}

/* Button */
.btn-login {
    background: linear-gradient(135deg, #1cc88a, #13855c);
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-weight: 500;
    transition: 0.3s;
}

.btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

/* Link */
a {
    color: #1cc88a;
    text-decoration: none;
}

/* Flash messages */
.toast {
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- Logo -->
<div class="logo-container">
    <img src="static/secure.png" alt="Logo" width="180" height="180">
</div>

<!-- Login Card -->
<div class="login-card">

<div class="text-center mb-4">
    <h3>Secure Login</h3>
    <p style="opacity:0.7;">Access your dashboard securely</p>
</div>

<!-- Flash -->
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="position-fixed top-0 end-0 p-3">
{% for category, message in messages %}
<div class="toast show text-bg-{{ 'success' if category=='success' else 'danger' }} mb-2">
<div class="d-flex">
<div class="toast-body">{{ message }}</div>
<button class="btn-close btn-close-white m-auto me-2" onclick="this.parentElement.parentElement.remove()"></button>
</div>
</div>
{% endfor %}
</div>
{% endif %}
{% endwith %}

<form method="POST">

<div class="mb-3">
<input name="username" class="form-control" placeholder="Username" required>
</div>

<div class="mb-3">
<input name="password" type="password" class="form-control" placeholder="Password" required>
</div>

<div class="d-grid mb-3">
<button class="btn btn-login">🔐 Login Securely</button>
</div>

</form>

<div class="text-center">
<small>Don't have an account? 
<a href="{{ url_for('SignUpPage') }}">Create account</a>
</small>
</div>

</div>

<script>
setTimeout(()=>document.querySelectorAll('.toast').forEach(t=>t.remove()),3000)
</script>

</body>
</html>
