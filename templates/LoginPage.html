<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #f5f6f8, #55b8f2);
  height: 100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.card { border-radius:15px; }
</style>
</head>
<body>

<div class="card p-4" style="width:400px;">

<h3 class="text-center mb-3">Login</h3>

<!-- Flash -->
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="position-fixed top-0 end-0 p-3">
{% for category, message in messages %}
<div class="toast show text-bg-{{ 'success' if category=='success' else 'danger' }} mb-2">
<div class="d-flex">
<div class="toast-body">{{ message }}</div>
<button class="btn-close btn-close-white m-auto me-2" onclick="this.parentElement.parentElement.remove()"></button>
</div>
</div>
{% endfor %}
</div>
{% endif %}
{% endwith %}

<form method="POST">
<input name="username" class="form-control mb-3" placeholder="Username" required>
<input name="password" type="password" class="form-control mb-3" placeholder="Password" required>
<button class="btn btn-primary w-100">Login</button>
</form>

<div class="text-center mt-3">
<a href="{{ url_for('SignUpPage') }}">Create account</a>
</div>

</div>

<script>
setTimeout(()=>document.querySelectorAll('.toast').forEach(t=>t.remove()),3000)
</script>

</body>
</html>
