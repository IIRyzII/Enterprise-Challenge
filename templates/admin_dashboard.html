{% extends "base.html" %}

{% block title %}Admin Dashboard{% endblock %}

{% block content %}
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="text-white fw-bold">Admin Panel</span>
    <a href="{{ url_for('Logout') }}" class="btn btn-danger btn-sm">Logout</a>
</nav>

<div class="container mt-4">
    <h3>Welcome {{ current_user.username }}</h3>

    <div class="row g-4 mt-4">

        <div class="col-md-6 col-lg-4">
            <div class="card gradient-1" onclick="window.location.href='/assign_roles'">
                <i class="fas fa-user-shield"></i>
                <h5>Assign Roles</h5>
                <p>Manage user permissions</p>
            </div>
        </div>

        <div class="col-md-6 col-lg-4">
            <div class="card gradient-3" onclick="window.location.href='/edit_users'">
                <i class="fas fa-edit"></i>
                <h5>Edit Users</h5>
                <p>Update personal details of employees</p>
            </div>
        </div>

        <div class="col-md-6 col-lg-4">
            <div class="card gradient-4" onclick="window.location.href='/view_logs'">
                <i class="fas fa-file-alt"></i>
                <h5>View Logs</h5>
                <p>See system activity logs</p>
            </div>
        </div>

    </div>
</div>
{% endblock %}
