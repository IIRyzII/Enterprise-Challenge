{% extends "base.html" %}

{% block title %}Employee Dashboard{% endblock %}

{% block content %}
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="text-white fw-bold">Employee Panel</span>
    <a href="{{ url_for('Logout') }}" class="btn btn-danger btn-sm">Logout</a>
</nav>

<div class="container mt-4">
    <h3>Welcome {{ current_user.username }}</h3>

    <div class="row g-4 mt-4">

        <div class="col-md-6 col-lg-4">
            <div class="card gradient-1" onclick="window.location.href='/view_shifts'">
                <i class="fas fa-calendar-alt"></i>
                <h5>View Shifts</h5>
                <p>Check your upcoming work schedule</p>
            </div>
        </div>

        <div class="col-md-6 col-lg-4">
            <div class="card gradient-2" onclick="window.location.href='/mark_availability'">
                <i class="fas fa-check-circle"></i>
                <h5>Mark Availability</h5>
                <p>Update your working availability</p>
            </div>
        </div>

    </div>
</div>
{% endblock %}
