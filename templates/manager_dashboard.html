{% extends "base.html" %}

{% block title %}Manager Dashboard{% endblock %}

{% block content %}
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="text-white fw-bold">Manager Panel</span>
    <a href="{{ url_for('Logout') }}" class="btn btn-danger btn-sm">Logout</a>
</nav>

<div class="container mt-4">
    <h3>Welcome {{ current_user.username }}</h3>

    <div class="row g-4 mt-4">

        <div class="col-md-6 col-lg-4">
            <div class="card gradient-1" onclick="window.location.href='/add_shift'">
                <i class="fas fa-plus"></i>
                <h5>Add Shift</h5>
                <p>Create new shifts for employees</p>
            </div>
        </div>

        <div class="col-md-6 col-lg-4">
            <div class="card gradient-4" onclick="window.location.href='/remove_shift'">
                <i class="fas fa-trash"></i>
                <h5>Remove Shift</h5>
                <p>Delete existing shifts</p>
            </div>
        </div>

        <div class="col-md-6 col-lg-4">
            <div class="card gradient-2" onclick="window.location.href='/employees'">
                <i class="fas fa-users"></i>
                <h5>Employees</h5>
                <p>View employee details</p>
            </div>
        </div>

    </div>
</div>
{% endblock %}
